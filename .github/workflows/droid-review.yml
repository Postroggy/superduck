name: Droid Auto Review

# Automated PR review powered by Factory Droid.
#
# Posts inline review comments and a summary on every non-draft PR. Combines
# a code review pass (bug / correctness / dead code / async / null-deref /
# resource-leak / off-by-one detection) with a STRIDE-based security review
# pass that runs in parallel as a sub-agent.
#
# Setup requirements
# ------------------
# 1. Install the Factory Droid GitHub App on this repo
#    (https://app.factory.ai → Settings → Integrations → GitHub).
# 2. Generate a Factory API key at
#    https://app.factory.ai/settings/api-keys and store it as the repo /
#    org secret `FACTORY_API_KEY`.
#
# To skip a review temporarily, mark the PR as `Draft` or include
# `[skip-review]` in the title.

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  droid-review:
    name: Droid auto review
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.user.login, '[bot]') &&
      !contains(github.event.pull_request.title, '[skip-review]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Droid auto review
        uses: Factory-AI/droid-action@v5
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          # Generate inline review comments + summary on every PR.
          automatic_review: true
          # Run STRIDE-based security review in parallel; appends a
          # "Security Review Summary" section to the PR comment.
          automatic_security_review: true
          # `deep` uses high-reasoning models — better signal/noise on a
          # multi-language monorepo (TypeScript/Vite extension + Go CLI).
          # Switch to `shallow` if review latency or spend becomes an issue.
          review_depth: deep
          security_severity_threshold: medium
