name: Test Coverage

on:
  push:
    branches: [main]
    paths:
      - 'chrome-crx/**'
      - 'chrome-native-host/**'
      - '.github/workflows/test-coverage.yml'
  pull_request:
    paths:
      - 'chrome-crx/**'
      - 'chrome-native-host/**'
      - '.github/workflows/test-coverage.yml'

# dorny/test-reporter creates check-runs and writes annotations on the PR,
# both of which require explicit token scopes when the repo defaults
# GITHUB_TOKEN to read-only. Without these, the "Publish test report" step
# fails with `HttpError: Resource not accessible by integration`.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  chrome-crx:
    name: chrome-crx coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-crx
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests with coverage thresholds
        run: bun run test:coverage
      - name: Run tests with timing instrumentation
        run: bun run test:perf
      - name: Print test performance report
        if: always()
        run: bun run test:perf:report
      - name: Upload JUnit test report (timing data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-crx-test-junit
          path: chrome-crx/test-results.junit.xml
          if-no-files-found: warn
      - name: Publish test report (durations)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: chrome-crx tests
          path: chrome-crx/test-results.junit.xml
          reporter: jest-junit
          fail-on-error: false
      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-crx-coverage-html
          path: chrome-crx/coverage
          if-no-files-found: ignore

  chrome-native-host:
    name: chrome-native-host coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-native-host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: chrome-native-host/go.mod
          cache: true
          cache-dependency-path: chrome-native-host/go.sum
      - name: Run tests with coverage gate
        run: make test-coverage
      - name: Run tests with timing instrumentation
        run: make test-perf
      - name: Upload Go test timing JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-native-host-test-timings
          path: chrome-native-host/test-results.json
          if-no-files-found: warn
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-native-host-coverage
          path: chrome-native-host/coverage.out
          if-no-files-found: ignore
