name: Secret scan

# Catches accidental commits of the PostHog write-only project token (or any
# `phc_...` style key) before they reach main. Runs on every push and PR.
#
# This is a coarse net — for thorough secret scanning enable GitHub's native
# "Secret scanning" feature in repo settings as well.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for embedded PostHog keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Grep for phc_ tokens in tracked files
        run: |
          # Match `phc_` followed by >= 30 of the alnum chars PostHog uses.
          # Excludes binary files, this workflow itself, and the analytics
          # source comment that references the format.
          PATTERN='phc_[A-Za-z0-9]{30,}'
          MATCHES=$(git grep -InE "$PATTERN" -- \
            ':!.github/workflows/secret-scan.yml' \
            ':!chrome-native-host/internal/analytics/posthog.go' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::PostHog write key (phc_*) found in tracked files:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: no phc_ tokens found in tracked files."
