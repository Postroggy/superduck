name: Droid Tag

# On-demand Droid commands triggered by `@droid` mentions.
#
# Supported commands (post in a PR / issue / review comment):
#   @droid fill              — rewrite this PR description against the
#                              repo's pull_request_template.md
#   @droid review            — run code review on the current PR
#   @droid security          — run STRIDE security review on the current PR
#   @droid security --full   — full-repo security scan; opens a follow-up PR
#                              with the report at
#                              .factory/security/reports/security-report-*.md
#
# Differs from droid-review.yml: that workflow runs automatically on every
# non-draft PR. This one only fires when a human (or bot) explicitly tags
# `@droid`, which makes it cheap to re-run a review on demand or ask for a
# PR description rewrite without re-pushing commits.
#
# Requires the `FACTORY_API_KEY` repo / org secret and the Factory Droid
# GitHub App installed on this repository.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  droid:
    name: Run @droid command
    # Skip events triggered by bots — in particular factory-droid[bot] itself,
    # whose summary comments contain "@droid" links that would otherwise
    # re-trigger this workflow and fail in droid-action's prepare step.
    if: |
      github.actor != 'factory-droid[bot]' &&
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@droid')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@droid')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@droid')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid'))) ||
        (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Droid Exec
        uses: Factory-AI/droid-action@v5
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
