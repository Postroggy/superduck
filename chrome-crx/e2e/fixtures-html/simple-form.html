<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Form - Test Fixture</title>
  <style>
    body { font-family: sans-serif; padding: 40px; }
    .form-container { max-width: 500px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 100px; resize: vertical; }
    button[type="submit"] { background: #2196F3; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button[type="submit"]:hover { background: #1976D2; }
    #form-result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 4px; display: none; }
    .readonly-field { background: #f5f5f5; cursor: not-allowed; }
    .tab-target { padding: 8px; border: 1px solid #ddd; margin-top: 5px; border-radius: 4px; }
    .tab-target:focus { outline: 2px solid #2196F3; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Contact Form</h1>
    <form id="contact-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" tabindex="1">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" tabindex="2">
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" tabindex="3">
          <option value="">Select a subject</option>
          <option value="general">General Inquiry</option>
          <option value="support">Support</option>
          <option value="feedback">Feedback</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Enter your message" tabindex="4"></textarea>
      </div>
      <div class="form-group">
        <label for="readonly-field">Read-only Field</label>
        <input type="text" id="readonly-field" value="Cannot edit this" readonly class="readonly-field">
      </div>
      <div class="form-group">
        <label>Focusable elements for tab test</label>
        <div class="tab-target" tabindex="5" id="tab-target-1">Tab target 1</div>
        <div class="tab-target" tabindex="6" id="tab-target-2">Tab target 2</div>
        <div class="tab-target" tabindex="7" id="tab-target-3">Tab target 3</div>
      </div>
      <button type="submit" tabindex="8">Submit</button>
    </form>
    <div id="form-result"></div>
  </div>
  <script>
    const events = [];
    document.getElementById('name').addEventListener('input', (e) => {
      events.push({ type: 'input', target: 'name', value: e.target.value });
    });
    document.getElementById('name').addEventListener('change', (e) => {
      events.push({ type: 'change', target: 'name', value: e.target.value });
    });
    document.getElementById('email').addEventListener('input', (e) => {
      events.push({ type: 'input', target: 'email', value: e.target.value });
    });

    function handleSubmit(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData.entries());
      const result = document.getElementById('form-result');
      result.style.display = 'block';
      result.textContent = 'Form submitted: ' + JSON.stringify(data);
      window.__formSubmitted = true;
      window.__formData = data;
    }

    window.getEvents = () => events;
  </script>
</body>
</html>
