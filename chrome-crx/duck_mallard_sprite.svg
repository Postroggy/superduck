<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 1600" width="200" height="1600">
  <defs>
    <!-- We can define the static mallard body to reuse it, but we'll just draw it explicitly to keep layers simple and editable frame-by-frame if needed later. -->
    <g id="mallard-body">
      <!-- Right Leg -->
      <path d="M 110 140 L 110 175 L 125 185 L 115 188 L 100 188 L 95 182 L 102 175 L 102 140 Z" fill="#F48C06" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
      
      <!-- Left Leg -->
      <path d="M 85 140 L 85 175 L 100 185 L 90 188 L 75 188 L 70 182 L 77 175 L 77 140 Z" fill="#F48C06" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
      
      <!-- Tail -->
      <path d="M 40 102 L 15 90 L 25 108 L 10 115 L 25 125 Z" fill="#1A1A1A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />

      <!-- Body Base -->
      <path d="M 25 115 C 40 150, 90 170, 130 150 C 155 135, 165 110, 145 80 L 115 80 C 100 95, 60 105, 25 115 Z" fill="#E5E7E9" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />

      <!-- Chest -->
      <path d="M 115 80 L 145 80 C 165 110, 155 135, 130 150 C 110 130, 105 100, 115 80 Z" fill="#8D6A58" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />

      <!-- Wing -->
      <path d="M 50 115 C 70 105, 110 105, 130 120 C 110 145, 60 145, 50 115 Z" fill="#BEC3C6" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
      <path d="M 63 122 L 112 122 L 102 138 L 58 138 Z" fill="#FFFFFF" stroke="#2D3142" stroke-width="3" stroke-linejoin="round" />
      <path d="M 66 125 L 109 125 L 101 135 L 61 135 Z" fill="#2B5A9B" stroke="#2D3142" stroke-width="3" stroke-linejoin="round" />

      <!-- Neck Ring -->
      <path d="M 115 80 Q 130 88 145 80 L 143 70 Q 130 78 117 70 Z" fill="#FFFFFF" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />

      <!-- Head -->
      <path d="M 117 70 C 100 50, 105 20, 130 20 C 150 20, 155 45, 143 70 Q 130 78 117 70 Z" fill="#388E3C" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    </g>
  </defs>

  <!-- Frame 0: 静止 (Static) -->
  <g id="frame-0" transform="translate(-5, 0)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="4" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path class="lower-beak" d="M 146 51 C 160 51, 175 52, 182 53 C 170 56, 150 56, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 42, 180 44, 186 48 C 187 49, 182 51, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 1: 微张嘴 (Slightly open) -->
  <g id="frame-1" transform="translate(-5, 200)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="4" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path d="M 146 51 L 183 47 L 180 55 Z" fill="#D84315" stroke="#2D3142" stroke-width="3" stroke-linejoin="round" />
    <path class="lower-beak" d="M 146 51 C 160 53, 175 54, 180 56 C 170 59, 150 58, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 40, 180 42, 186 46 C 187 47, 182 48, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 2: 渐开 (Opening wider) -->
  <g id="frame-2" transform="translate(-5, 400)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="5" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path d="M 146 51 L 184 45 L 178 58 Z" fill="#D84315" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="lower-beak" d="M 146 51 C 160 56, 175 58, 178 60 C 168 63, 150 60, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 38, 180 40, 186 44 C 187 45, 182 45, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 3: 全力 QUACK（含音波） -->
  <g id="frame-3" transform="translate(-5, 600)">
    <use href="#mallard-body" />
    <g class="waves">
      <path d="M 190 35 Q 196 50 190 65" fill="none" stroke="#2D3142" stroke-width="4" stroke-linecap="round" />
      <path d="M 196 30 Q 202 50 196 70" fill="none" stroke="#2D3142" stroke-width="4" stroke-linecap="round" />
    </g>
    <g class="eye">
      <path d="M 128 39 Q 132 32 136 39" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round" />
    </g>
    <path d="M 146 51 Q 165 42 186 40 L 178 65 Q 160 60 146 51 Z" fill="#D84315" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path d="M 152 54 Q 165 58 172 62 Q 165 65 148 56 Z" fill="#FF8A65" stroke="#2D3142" stroke-width="2" />
    <path class="lower-beak" d="M 146 51 C 160 62, 175 64, 178 68 C 168 70, 150 62, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 33, 180 36, 188 40 C 189 42, 182 43, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 4: 持续叫 (Continuous quack) -->
  <g id="frame-4" transform="translate(-5, 800)">
    <use href="#mallard-body" />
    <g class="waves">
      <path d="M 192 37 Q 198 52 192 67" fill="none" stroke="#2D3142" stroke-width="4" stroke-linecap="round" />
      <path d="M 198 32 Q 204 52 198 72" fill="none" stroke="#2D3142" stroke-width="4" stroke-linecap="round" />
    </g>
    <g class="eye">
      <path d="M 128 39 Q 132 32 136 39" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round" />
    </g>
    <path d="M 146 51 Q 165 44 185 42 L 176 63 Q 160 60 146 51 Z" fill="#D84315" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path d="M 152 54 Q 165 57 172 60 Q 165 63 148 56 Z" fill="#FF8A65" stroke="#2D3142" stroke-width="2" />
    <path class="lower-beak" d="M 146 51 C 160 60, 175 62, 177 66 C 168 68, 150 62, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 35, 180 38, 187 42 C 188 43, 182 43, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 5: 合嘴 (Closing down) -->
  <g id="frame-5" transform="translate(-5, 1000)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="4" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path d="M 146 51 L 184 46 L 178 57 Z" fill="#D84315" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="lower-beak" d="M 146 51 C 160 55, 175 56, 179 58 C 169 62, 150 59, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 39, 180 41, 186 45 C 187 46, 182 46, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 6: 快闭上 (Almost closed) -->
  <g id="frame-6" transform="translate(-5, 1200)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="4" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path d="M 146 51 L 183 48 L 180 53 Z" fill="#D84315" stroke="#2D3142" stroke-width="3" stroke-linejoin="round" />
    <path class="lower-beak" d="M 146 51 C 160 52, 175 53, 181 54 C 168 57, 150 57, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 41, 180 43, 185 47 C 187 48, 182 49, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Frame 7: 回到静止 (Static) -->
  <g id="frame-7" transform="translate(-5, 1400)">
    <use href="#mallard-body" />
    <g class="eye">
      <circle cx="132" cy="38" r="4" fill="#1A1A1A" />
      <circle cx="131" cy="37" r="1.5" fill="#FFFFFF" />
    </g>
    <path class="lower-beak" d="M 146 51 C 160 51, 175 52, 182 53 C 170 56, 150 56, 144 56 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
    <path class="upper-beak" d="M 144 42 C 160 42, 180 44, 186 48 C 187 49, 182 51, 146 51 Z" fill="#F4B41A" stroke="#2D3142" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>
